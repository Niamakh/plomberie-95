<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" role="img" aria-label="Comparatif tuyauterie PER, cuivre et multicouche côte à côte">
  <rect width="800" height="450" fill="#f0f7ff"/>
  <rect x="80" y="180" width="180" height="24" rx="12" fill="#22c55e"/>
  <text x="170" y="165" text-anchor="middle" fill="#166534" font-family="sans-serif" font-size="14" font-weight="600">PER</text>
  <rect x="310" y="180" width="180" height="16" rx="2" fill="#d97706"/>
  <text x="400" y="165" text-anchor="middle" fill="#92400e" font-family="sans-serif" font-size="14" font-weight="600">Cuivre</text>
  <rect x="540" y="180" width="180" height="20" rx="4" fill="#0ea5e9"/>
  <text x="630" y="165" text-anchor="middle" fill="#0369a1" font-family="sans-serif" font-size="14" font-weight="600">Multicouche</text>
  <text x="400" y="280" text-anchor="middle" fill="#1e3a5f" font-family="sans-serif" font-size="16" font-weight="600">Trois matériaux, trois logiques de pose</text>
</svg>
